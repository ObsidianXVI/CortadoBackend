name: cortado
description: Placeholder Flutter package for the Cortado cloud IDE backend client.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.1
  flutter_riverpod: ^2.5.0
  http: ^1.2.0
  grpc: ^5.1.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  protobuf: ^6.0.0
  riverpod: ^2.5.0
  web: ^1.1.1
  web_socket_channel: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.1.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: false
