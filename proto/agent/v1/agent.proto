syntax = "proto3";

package agent.v1;
import "google/protobuf/timestamp.proto";

option go_package = "github.com/your-org/cortado/agent/gen/agent/v1";

service WorkspaceAgentService {
  rpc CreatePty(CreatePtyRequest) returns (CreatePtyResponse);
  rpc StreamPty(stream StreamPtyRequest) returns (stream StreamPtyResponse);
  rpc OpenLSP(OpenLSPRequest) returns (OpenLSPResponse);
  rpc StreamLSP(stream LSPMessage) returns (stream LSPMessage);
  // Returns recent idle/activity info for this agent.
  // Used by the control plane to distinguish busy builds from idle sessions.
  rpc GetIdleStatus(GetIdleStatusRequest) returns (GetIdleStatusResponse);
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc FlushUsageWAL(FlushUsageWALRequest) returns (FlushUsageWALResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  rpc ReadFile(ReadFileRequest) returns (stream ReadFileResponse);
  rpc WriteFile(stream WriteFileRequest) returns (WriteFileResponse);
  rpc MakeDir(MakeDirRequest) returns (MakeDirResponse);
  rpc RenamePath(RenamePathRequest) returns (RenamePathResponse);
  rpc DeletePath(DeletePathRequest) returns (DeletePathResponse);
  rpc WatchFiles(WatchFilesRequest) returns (stream WatchFilesResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message CreatePtyRequest {
  uint32 cols = 1;
  uint32 rows = 2;
  string shell = 3;
  repeated string env = 4;
}

message CreatePtyResponse {
  string pty_id = 1;
}

message OpenLSPRequest {
  string language = 1;
}

message OpenLSPResponse {}

message StreamPtyRequest {
  string pty_id = 1;

  oneof payload {
    bytes data = 2;
    WindowSize resize = 3;
    int32 signal = 4;
  }
}

message StreamPtyResponse {
  oneof payload {
    bytes data = 1;
    int32 exit_code = 2;
  }
}

message LSPMessage {
  bytes data = 1;
}

message WindowSize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

// GetIdleStatusRequest requests the agent recent idle/activity status.
message GetIdleStatusRequest {}

// IdleStatus reports the last PTY write activity time and an
// averaged CPU utilization over the last 60 seconds for the
// current container/cgroup.
message GetIdleStatusResponse {
  // RFC3339 timestamp of the most recent PTY write activity observed.
  // If no PTY write has occurred since the agent started, this field may be unset.
  google.protobuf.Timestamp last_pty_activity_time = 1;

  // Average CPU usage percentage over the last 60 seconds, in the range [0, 100 * cpu_count].
  // The value accounts for container CPU quotas if detectable; otherwise it is based on host CPUs.
  double cpu_percent_over_sixty_seconds = 2;
}

message CreateSnapshotRequest {}

message CreateSnapshotResponse {
  string repository = 1;
}

message FlushUsageWALRequest {}

message FlushUsageWALResponse {}

message ListDirRequest {
  string path = 1;
}

message ListDirResponse {
  repeated DirectoryEntry entries = 1;
}

message DirectoryEntry {
  string name = 1;
  int64 size = 2;
  bool is_dir = 3;
  google.protobuf.Timestamp mod_time = 4;
  uint32 permissions = 5;
}

message ReadFileRequest {
  string path = 1;
}

// Each streamed response carries one file chunk in sequence order.
message ReadFileResponse {
  ReadFileChunk chunk = 1;
}

message ReadFileChunk {
  bytes data = 1;
  int32 seq = 2;
  bool is_last = 3;
  bytes checksum = 4;
}

// Each streamed request carries one file chunk for the target path.
message WriteFileRequest {
  WriteFileChunk chunk = 1;
}

message WriteFileChunk {
  string path = 1;
  bytes data = 2;
  int32 seq = 3;
  bool is_last = 4;
  bytes checksum = 5;
  optional bool create_missing_dirs = 6;
}

message WriteFileResponse {
  int64 bytes_written = 1;
  bytes checksum = 2;
}

message MakeDirRequest {
  string path = 1;
}

message MakeDirResponse {}

message RenamePathRequest {
  string old_path = 1;
  string new_path = 2;
}

message RenamePathResponse {}

message DeletePathRequest {
  string path = 1;
}

message DeletePathResponse {}

message WatchFilesRequest {}

message WatchFilesResponse {
  FileEvent event = 1;
}

enum FileEventType {
  FILE_EVENT_TYPE_UNSPECIFIED = 0;
  FILE_EVENT_TYPE_CREATED = 1;
  FILE_EVENT_TYPE_MODIFIED = 2;
  FILE_EVENT_TYPE_DELETED = 3;
  FILE_EVENT_TYPE_RENAMED = 4;
}

message FileEvent {
  string path = 1;
  FileEventType type = 2;
  bytes checksum = 3;
}
