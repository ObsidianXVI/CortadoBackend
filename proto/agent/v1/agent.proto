syntax = "proto3";

package agent.v1;
import "google/protobuf/timestamp.proto";

option go_package = "github.com/your-org/cortado/agent/gen/agent/v1";

service WorkspaceAgentService {
  rpc CreatePty(CreatePtyRequest) returns (CreatePtyResponse);
  rpc StreamPty(stream StreamPtyRequest) returns (stream StreamPtyResponse);
  // Returns recent idle/activity info for this agent.
  // Used by the control plane to distinguish busy builds from idle sessions.
  rpc GetIdleStatus(GetIdleStatusRequest) returns (GetIdleStatusResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message CreatePtyRequest {
  uint32 cols = 1;
  uint32 rows = 2;
  string shell = 3;
  repeated string env = 4;
}

message CreatePtyResponse {
  string pty_id = 1;
}

message StreamPtyRequest {
  string pty_id = 1;

  oneof payload {
    bytes data = 2;
    WindowSize resize = 3;
    int32 signal = 4;
  }
}

message StreamPtyResponse {
  oneof payload {
    bytes data = 1;
    int32 exit_code = 2;
  }
}

message WindowSize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

// GetIdleStatusRequest requests the agent recent idle/activity status.
message GetIdleStatusRequest {}

// IdleStatus reports the last PTY write activity time and an
// averaged CPU utilization over the last 60 seconds for the
// current container/cgroup.
message GetIdleStatusResponse {
  // RFC3339 timestamp of the most recent PTY write activity observed.
  // If no PTY write has occurred since the agent started, this field may be unset.
  google.protobuf.Timestamp last_pty_activity_time = 1;

  // Average CPU usage percentage over the last 60 seconds, in the range [0, 100 * cpu_count].
  // The value accounts for container CPU quotas if detectable; otherwise it is based on host CPUs.
  double cpu_percent_over_sixty_seconds = 2;
}
