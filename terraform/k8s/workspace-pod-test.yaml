apiVersion: v1
kind: Service
metadata:
  name: workspace-pod-test
  namespace: cortado-workspaces
  labels:
    app.kubernetes.io/name: cortado-workspace-agent
    cortado/test-pod: "true"
    cortado/workspace-id: workspace-pod-test
spec:
  clusterIP: None
  selector:
    cortado/workspace-id: workspace-pod-test
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Pod
metadata:
  name: workspace-pod-test
  namespace: cortado-workspaces
  labels:
    app.kubernetes.io/name: cortado-workspace-agent
    cortado/test-pod: "true"
    cortado/workspace-id: workspace-pod-test
spec:
  priorityClassName: workspace-priority
  serviceAccountName: workspace-sa
  restartPolicy: Never
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: cortado-workspace-agent
  containers:
    - name: workspace-agent
      image: ${workspace_image}
      env:
        - name: HOME
          value: /workspace/.cortado/runtime/home
        - name: TMPDIR
          value: /workspace/.cortado/runtime/tmp
        - name: XDG_CACHE_HOME
          value: /workspace/.cortado/runtime/cache
        - name: PUB_CACHE
          value: /workspace/.cortado/runtime/pub-cache
        - name: GRADLE_USER_HOME
          value: /workspace/.cortado/runtime/gradle
        - name: npm_config_cache
          value: /workspace/.cortado/runtime/npm-cache
      ports:
        - containerPort: 9090
      resources:
        requests:
          ephemeral-storage: 4Gi
        limits:
          ephemeral-storage: 4Gi
      volumeMounts:
        - name: workspace-data
          mountPath: /workspace
    - name: qdrant
      image: qdrant/qdrant:v1.12.0
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
          ephemeral-storage: 1Gi
        limits:
          memory: 256Mi
          cpu: 100m
          ephemeral-storage: 1Gi
      volumeMounts:
        - name: workspace-data
          mountPath: /qdrant/storage
          subPath: .cortado/qdrant
  volumes:
    - name: workspace-data
      emptyDir: {}
