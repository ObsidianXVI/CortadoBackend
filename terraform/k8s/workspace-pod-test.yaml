apiVersion: v1
kind: Service
metadata:
  name: workspace-pod-test
  namespace: cortado-workspaces
  labels:
    app.kubernetes.io/name: cortado-workspace-agent
    cortado/test-pod: "true"
    cortado/workspace-id: workspace-pod-test
spec:
  clusterIP: None
  selector:
    cortado/workspace-id: workspace-pod-test
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Pod
metadata:
  name: workspace-pod-test
  namespace: cortado-workspaces
  labels:
    app.kubernetes.io/name: cortado-workspace-agent
    cortado/test-pod: "true"
    cortado/workspace-id: workspace-pod-test
spec:
  serviceAccountName: workspace-sa
  restartPolicy: Never
  containers:
    - name: workspace-agent
      image: ${workspace_image}
      ports:
        - containerPort: 9090
      volumeMounts:
        - name: workspace-data
          mountPath: /workspace
    - name: qdrant
      image: qdrant/qdrant:v1.12.0
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
      volumeMounts:
        - name: workspace-data
          mountPath: /qdrant/storage
          subPath: .cortado/qdrant
  volumes:
    - name: workspace-data
      emptyDir: {}
