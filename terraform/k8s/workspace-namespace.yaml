apiVersion: v1
kind: Namespace
metadata:
  name: cortado-workspaces
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: workspace-priority
value: 1000
globalDefault: false
preemptionPolicy: Never
description: User workspace pods should outrank default-priority workloads without preempting others.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-sa
  namespace: cortado-workspaces
  annotations:
    iam.gke.io/gcp-service-account: ${workspace_gsa}
    iam.gke.io/return-principal-id-as-email: "true"
